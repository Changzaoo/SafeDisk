services:
  - type: web
    name: safedisk
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm install && npm run build
    startCommand: npm run start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: 24.15.0
      - key: ALLOWED_ORIGINS
        value: https://safedisk.vercel.app
      - key: SAFEDISK_DB_PATH
        value: /tmp/safedisk.sqlite
      - key: SAFEDISK_LOG_DIR
        value: /tmp/safedisk-logs
